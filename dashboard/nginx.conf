server {
    listen 80;
    server_name _;

    # Proxy reverso (mismo origen, sin CORS). La barra final reescribe el prefijo.
    location /api/cliente/ {
        proxy_pass http://cliente-service:8081/;
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
    }

    location /api/cuenta/ {
        proxy_pass http://cuenta-service:8082/;
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
    }

    # Front estático
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
