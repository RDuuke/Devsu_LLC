server:
  port: 8081
  shutdown: graceful   # cierre ordenado: termina peticiones en curso antes de apagar

spring:
  application:
    name: cliente-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cliente_db}
    username: ${DB_USER:devsu}
    password: ${DB_PASSWORD:devsu}
    hikari:
      # Pool de conexiones ajustado para rendimiento y resiliencia
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      max-lifetime: 1800000

  jpa:
    open-in-view: false          # evita el antipatrón OSIV (mejor rendimiento)
    hibernate:
      ddl-auto: validate         # el esquema lo gestiona Flyway, no Hibernate
    properties:
      hibernate:
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  outbox:
    poll-interval-ms: 2000       # frecuencia del relay del Outbox
  security:
    api-key: ${API_KEY:devsu-secret-key}   # exigida en operaciones de escritura

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true            # liveness/readiness para Docker/K8s
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # Swagger UI unificada: selector con ambos microservicios.
    urls-primary-name: Cliente Service
    urls:
      - name: Cliente Service
        url: http://localhost:8081/v3/api-docs
      - name: Cuenta Service
        url: http://localhost:8082/v3/api-docs
